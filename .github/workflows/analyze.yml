name: Analyze Company Data

# NOTE: This workflow requires Anthropic API credits (ANTHROPIC_API_KEY with a paid balance).
# For local analysis using Claude Pro subscription, run:
#   bash analyzer/run_analysis.sh <ticker>
# from a terminal where `claude` CLI is authenticated (claude --print).
#
# This workflow is kept for reference but is not automatically triggered.
# To re-enable auto-trigger, restore the workflow_run section below.

on:
  workflow_dispatch:
    inputs:
      ticker:
        description: '証券コード（4桁）'
        required: true
        type: string

jobs:
  analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r analyzer/requirements.txt

      - name: Run analysis
        env:
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          TICKER="${{ inputs.ticker }}"
          if [ -z "$TICKER" ]; then
            echo "No ticker provided"
            exit 1
          fi
          bash analyzer/run_analysis.sh "$TICKER"
