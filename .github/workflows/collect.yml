name: Collect Company Data

on:
  workflow_dispatch:
    inputs:
      ticker:
        description: '証券コード（4桁）または企業名'
        required: true
        type: string
      mode:
        description: '収集モード'
        required: true
        type: choice
        options:
          - full
          - update
        default: full
      include_competitors:
        description: '競合データも収集する'
        type: boolean
        default: true

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r collector/requirements.txt

      - name: Run data collector
        env:
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
        run: |
          python collector/main.py \
            --ticker "${{ inputs.ticker }}" \
            --mode "${{ inputs.mode }}" \
            --include-competitors "${{ inputs.include_competitors }}"
